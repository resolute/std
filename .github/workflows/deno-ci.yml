name: Deno CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: latest
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Check formatting
        run: deno fmt --check deno.json .gitignore *.ts dom/*.ts

      - name: Lint
        run: deno lint

      - name: Type check
        run: deno task check

      - name: Test
        run: deno task test

      - name: Test with Node
        run: deno task test:node

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: true
          files: coverage/lcov.info

      - name: Pack npm tarball
        run: deno task clean && deno task pack

      - name: Verify npm tarball contents
        shell: bash
        run: |
          test -f resolute-std-*.tgz
          tar -tzf resolute-std-*.tgz
          ! tar -tzf resolute-std-*.tgz | grep -E '(^|/)(promise-alt|node_modules|coverage)/'
          ! tar -tzf resolute-std-*.tgz | grep -E '(^|/)[^/]+\.ts$' | grep -v '\.d\.ts$'
          ! tar -tzf resolute-std-*.tgz | grep -E '\.(cjs|mjs|map)$'
